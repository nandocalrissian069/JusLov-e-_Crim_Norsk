// PERSISTENCE (localStorage)
// ═══════════════════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'juslove_no_teaser2_v1';
const DISCLAIMER_KEY = 'juslove_no_teaser2_disclaimer_v1';

function loadDisclaimerAccepted() {
  try { return localStorage.getItem(DISCLAIMER_KEY) === 'accepted'; } catch { return false; }
}
function saveDisclaimerAccepted() {
  try { localStorage.setItem(DISCLAIMER_KEY, 'accepted'); } catch {}
}
function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const p = JSON.parse(raw);
    return { streak: p.streak || 0, xp: p.xp || 0, completedLessons: new Set(p.completedLessons || []), lastDate: p.lastDate || null };
  } catch { return null; }
}
function saveProgress(p) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      streak: p.streak, xp: p.xp, completedLessons: Array.from(p.completedLessons), lastDate: p.lastDate
    }));
  } catch {}
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════

function App() {
  const [view, setView] = useState({ name: 'home' });
  const [progress, setProgress] = useState(() => loadProgress() || { streak: 0, xp: 0, completedLessons: new Set(), lastDate: null });
  const [showInfo, setShowInfo] = useState(false);
  const [disclaimerAccepted, setDisclaimerAccepted] = useState(() => loadDisclaimerAccepted());

  useEffect(() => { saveProgress(progress); }, [progress]);

  const completeLesson = (lessonId, xpEarned) => {
    const today = new Date().toISOString().slice(0, 10);
    setProgress(p => {
      const newCompleted = new Set(p.completedLessons);
      newCompleted.add(lessonId);
      let newStreak = p.streak;
      if (p.lastDate !== today) {
        const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        newStreak = p.lastDate === yesterday ? p.streak + 1 : 1;
      }
      return { streak: newStreak, xp: p.xp + xpEarned, completedLessons: newCompleted, lastDate: today };
    });
  };

  return (
    <div style={{ minHeight: '100vh', background: c.bg, color: c.ink, fontFamily: fB }}>
      <div style={{ maxWidth: 460, margin: '0 auto', minHeight: '100vh', background: c.bg, position: 'relative', boxShadow: '0 0 60px rgba(26,31,44,0.05)', borderLeft: `1px solid ${c.border}`, borderRight: `1px solid ${c.border}` }}>
        {view.name === 'home' && <Home progress={progress} onOpenKapittel={(id) => setView({ name: 'kapittel', kapittelId: id })} onShowInfo={() => setShowInfo(true)} />}
        {view.name === 'kapittel' && <Kapittel kapittelId={view.kapittelId} progress={progress} onBack={() => setView({ name: 'home' })} onSelectMode={(m) => setView({ name: 'modeList', kapittelId: view.kapittelId, mode: m })} />}
        {view.name === 'modeList' && <ModeList kapittelId={view.kapittelId} mode={view.mode} progress={progress} onBack={() => setView({ name: 'kapittel', kapittelId: view.kapittelId })} onStartLesson={(lId) => setView({ name: 'lesson', lessonId: lId, returnTo: { name: 'modeList', kapittelId: view.kapittelId, mode: view.mode } })} />}
        {view.name === 'lesson' && <LessonRouter lessonId={view.lessonId} onBack={() => setView(view.returnTo || { name: 'home' })} onComplete={(xp) => { completeLesson(view.lessonId, xp); setView({ name: 'result', xp, returnTo: view.returnTo }); }} />}
        {view.name === 'result' && <Result xp={view.xp} streak={progress.streak} onContinue={() => setView(view.returnTo || { name: 'home' })} />}

        {showInfo && <InfoSheet onClose={() => setShowInfo(false)} onReset={() => { localStorage.removeItem(STORAGE_KEY); setProgress({ streak: 0, xp: 0, completedLessons: new Set(), lastDate: null }); setShowInfo(false); }} />}

        {!disclaimerAccepted && <StartupDisclaimer onAccept={() => { saveDisclaimerAccepted(); setDisclaimerAccepted(true); }} />}
      </div>
    </div>
  );
}

          <div style={{ fontSize: 10, color: c.muted, fontWeight: 600, letterSpacing: 1.2, textTransform: 'uppercase' }}>Kapittel {kapittel.number}</div>
          <div style={{ fontFamily: fD, fontSize: 16, fontWeight: 700, lineHeight: 1.2, marginTop: 2 }}>{kapittel.title}</div>
          <div style={{ fontSize: 12, color: c.muted, marginTop: 3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{kapittel.tagline}</div>
          {kapittel.unlocked && total > 0 && (
            <div style={{ marginTop: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ flex: 1, height: 4, background: c.border, borderRadius: 999, overflow: 'hidden' }}>
                <div style={{ height: '100%', width: `${(completed / total) * 100}%`, background: kapittel.color, borderRadius: 999 }} />
              </div>
              <div style={{ fontSize: 11, color: c.muted, fontWeight: 600 }}>{completed}/{total}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// KAPITTEL DETAIL (Mode selection)

  return (

      <div style={{ padding: '14px 20px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: `1px solid ${c.border}`, background: c.bg, position: 'sticky', top: 0, zIndex: 10 }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 6, display: 'flex', color: c.ink }}><IconArrowLeft size={22} /></button>
        <div style={{ fontFamily: fD, fontSize: 18, fontWeight: 700 }}>Kapittel {kapittel.number}</div>
      </div>

      <div style={{ background: kapittel.color, padding: '26px 22px 30px', color: '#fff', position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', right: -30, top: -30, fontFamily: fD, fontSize: 200, fontWeight: 900, opacity: 0.1, lineHeight: 1 }}>{kapittel.number}</div>

        <div style={{ fontSize: 14, opacity: 0.85, marginTop: 8 }}>{kapittel.tagline}</div>

              style={{ display: 'flex', width: '100%', alignItems: 'center', gap: 14, padding: 16, marginBottom: 10, background: empty ? '#F2EBE0' : c.card, border: `1px solid ${c.border}`, borderRadius: 16, cursor: empty ? 'not-allowed' : 'pointer', textAlign: 'left', opacity: empty ? 0.55 : 1 }}>
              <div style={{ width: 46, height: 46, borderRadius: 12, background: mode.softColor, color: mode.color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><mode.Icon size={22} /></div>

                <div style={{ fontSize: 12, color: c.muted, marginTop: 2 }}>{empty ? 'Under forberedelse' : mode.description}</div>

                  <div style={{ marginTop: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ flex: 1, height: 4, background: c.border, borderRadius: 999, overflow: 'hidden' }}>

                    </div>
                    <div style={{ fontSize: 11, color: c.muted, fontWeight: 600 }}>{done}/{total}</div>
                  </div>

              {!empty && <IconChevronRight size={20} style={{ color: c.muted }} />}

        })}

  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// LESSON ROUTER
// ═══════════════════════════════════════════════════════════════════════════════

function LessonRouter({ lessonId, onBack, onComplete }) {
  const lesson = useMemo(() => {
    for (const t of KAPITLER) for (const mKey of Object.keys(t.modi)) {
      const found = t.modi[mKey].lessons.find(l => l.id === lessonId);
      if (found) return { ...found, modeKey: mKey };
    }
    return null;
  }, [lessonId]);
  if (!lesson) return null;
  if (lesson.type === 'laeringskort') return <Laeringskort lesson={lesson} onBack={onBack} onComplete={onComplete} />;
  if (lesson.type === 'straffbarhet') return <StraffbarhetsBygge lesson={lesson} onBack={onBack} onComplete={onComplete} />;
  return <QuizRunner lesson={lesson} onBack={onBack} onComplete={onComplete} />;
}

// ═══════════════════════════════════════════════════════════════════════════════
// QUIZ RUNNER (MC / TF / Kasus)
// ═══════════════════════════════════════════════════════════════════════════════

function QuizRunner({ lesson, onBack, onComplete }) {
  const mode = MODI[lesson.modeKey];
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [checked, setChecked] = useState(false);
  const [correctCount, setCorrectCount] = useState(0);

  const q = lesson.questions[idx];
  const total = lesson.questions.length;
  const isLast = idx === total - 1;
  const isCorrect = checked && selected === q.correct;

  const check = () => {
    if (selected === null) return;
    setChecked(true);
    if (selected === q.correct) setCorrectCount(c => c + 1);
  };
  const next = () => {
    if (isLast) onComplete(correctCount * 5 + (correctCount === total ? 10 : 0));
    else { setIdx(i => i + 1); setSelected(null); setChecked(false); }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 14, background: c.bg, borderBottom: `1px solid ${c.border}` }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'flex', color: c.muted }}><IconX size={22} /></button>
        <div style={{ flex: 1, height: 10, background: c.border, borderRadius: 999, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${((idx + (checked ? 1 : 0)) / total) * 100}%`, background: mode.color, borderRadius: 999, transition: 'width 0.35s' }} />
        </div>
        <div style={{ fontSize: 11, color: c.muted, fontWeight: 700, letterSpacing: 0.5 }}>{idx + 1}/{total}</div>
      </div>

      <div key={idx} className="fade-in" style={{ flex: 1, padding: 22, paddingBottom: 140 }}>
        <div style={{ fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', color: mode.color, fontWeight: 700 }}>
          {q.type === 'mc' && 'Flervalg'}
          {q.type === 'tf' && 'Rett eller galt'}
          {q.type === 'fall' && 'Kasusoppgave'}
        </div>

        {q.scenario && (
          <div style={{ marginTop: 14, padding: '14px 16px', background: mode.softColor, borderLeft: `3px solid ${mode.color}`, borderRadius: 8, fontFamily: fD, fontSize: 14.5, lineHeight: 1.55, fontStyle: 'italic' }}>
            {q.scenario}
          </div>
        )}

        <div style={{ fontFamily: fD, fontSize: 21, fontWeight: 700, lineHeight: 1.25, marginTop: 14, letterSpacing: -0.3 }}>{q.question}</div>

        <div style={{ marginTop: 22, display: 'flex', flexDirection: 'column', gap: 10 }}>
          {q.type === 'tf' ? (
            <div style={{ display: 'flex', gap: 10 }}>
              <TFBtn label="Rett" value={true} selected={selected} checked={checked} correct={q.correct} onClick={() => !checked && setSelected(true)} mode={mode} />
              <TFBtn label="Galt" value={false} selected={selected} checked={checked} correct={q.correct} onClick={() => !checked && setSelected(false)} mode={mode} />
            </div>
          ) : q.options.map((opt, i) => (
            <OptBtn key={i} index={i} label={opt} selected={selected === i} checked={checked} correct={i === q.correct} onClick={() => !checked && setSelected(i)} mode={mode} />
          ))}
        </div>
      </div>

      <FooterBar checked={checked} isCorrect={isCorrect} explanation={q.explanation} onCheck={check} onNext={next} canCheck={selected !== null} isLast={isLast} />
    </div>
  );
}

function OptBtn({ index, label, selected, checked, correct, onClick, mode }) {
  let bg = c.card, brd = c.border, col = c.ink, badge = c.muted;
  if (checked) {
    if (correct) { bg = c.successSoft; brd = c.success; col = c.success; badge = c.success; }
    else if (selected) { bg = c.errorSoft; brd = c.error; col = c.error; badge = c.error; }
  } else if (selected) { bg = mode.softColor; brd = mode.color; col = mode.color; badge = mode.color; }
  return (
    <button onClick={onClick} style={{ width: '100%', padding: '14px 14px', background: bg, border: `2px solid ${brd}`, borderRadius: 14, textAlign: 'left', cursor: checked ? 'default' : 'pointer', display: 'flex', alignItems: 'flex-start', gap: 12, fontFamily: fB, fontSize: 14, lineHeight: 1.4, color: col, transition: 'all 0.15s' }}>
      <div style={{ width: 26, height: 26, borderRadius: 8, flexShrink: 0, border: `1.5px solid ${badge}`, color: badge, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 13 }}>{String.fromCharCode(65 + index)}</div>
      <div style={{ flex: 1, fontWeight: 500, paddingTop: 2 }}>{label}</div>
    </button>
  );
}

function TFBtn({ label, value, selected, checked, correct, onClick, mode }) {
  const isSel = selected === value, isRight = correct === value;
  let bg = c.card, brd = c.border, col = c.ink;
  if (checked) {
    if (isRight) { bg = c.successSoft; brd = c.success; col = c.success; }
    else if (isSel) { bg = c.errorSoft; brd = c.error; col = c.error; }
  } else if (isSel) { bg = mode.softColor; brd = mode.color; col = mode.color; }
  return <button onClick={onClick} style={{ flex: 1, padding: '18px 14px', background: bg, border: `2px solid ${brd}`, borderRadius: 14, cursor: checked ? 'default' : 'pointer', fontFamily: fD, fontSize: 17, fontWeight: 700, color: col, transition: 'all 0.15s' }}>{label}</button>;
}

function FooterBar({ checked, isCorrect, explanation, onCheck, onNext, canCheck, isLast }) {
  return (
    <div style={{ position: 'sticky', bottom: 0, background: checked ? (isCorrect ? c.successSoft : c.errorSoft) : c.bg, borderTop: `1px solid ${c.border}`, padding: 18, transition: 'background 0.25s' }}>
      {checked && (
        <div className="fade-in" style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: isCorrect ? c.success : c.error, fontFamily: fD, fontSize: 18, fontWeight: 700 }}>
            {isCorrect ? <><IconCheck size={20} stroke={3} /> Rett!</> : <><IconX size={20} stroke={3} /> Ikke helt.</>}
          </div>
          <div style={{ fontSize: 13, color: c.ink, marginTop: 6, lineHeight: 1.55 }}>{explanation}</div>
        </div>
      )}
      {!checked ? (
        <button onClick={onCheck} disabled={!canCheck} style={{ width: '100%', padding: 14, background: canCheck ? c.ink : c.border, color: canCheck ? c.bg : c.muted, border: 'none', borderRadius: 12, fontFamily: fB, fontWeight: 700, fontSize: 15, cursor: canCheck ? 'pointer' : 'not-allowed', letterSpacing: 0.5 }}>SJEKK</button>
      ) : (
        <button onClick={onNext} style={{ width: '100%', padding: 14, background: isCorrect ? c.success : c.error, color: '#fff', border: 'none', borderRadius: 12, fontFamily: fB, fontWeight: 700, fontSize: 15, cursor: 'pointer', letterSpacing: 0.5 }}>{isLast ? 'FERDIG' : 'VIDERE'}</button>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// LÆRINGSKORT RUNNER
// ═══════════════════════════════════════════════════════════════════════════════

function Laeringskort({ lesson, onBack, onComplete }) {
  const mode = MODI[lesson.modeKey];
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [knew, setKnew] = useState(0);

  const card = lesson.cards[idx];
  const total = lesson.cards.length;
  const isLast = idx === total - 1;

  const rate = (gotIt) => {
    if (gotIt) setKnew(k => k + 1);
    if (isLast) onComplete(knew * 4 + (gotIt ? 4 : 0) + 10);
    else { setIdx(i => i + 1); setFlipped(false); }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 14, background: c.bg, borderBottom: `1px solid ${c.border}` }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'flex', color: c.muted }}><IconX size={22} /></button>
        <div style={{ flex: 1, height: 10, background: c.border, borderRadius: 999, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${((idx + 1) / total) * 100}%`, background: mode.color, borderRadius: 999, transition: 'width 0.35s' }} />
        </div>
        <div style={{ fontSize: 11, color: c.muted, fontWeight: 700, letterSpacing: 0.5 }}>{idx + 1}/{total}</div>
      </div>

      <div style={{ flex: 1, padding: 22, display: 'flex', flexDirection: 'column' }}>
        <div style={{ fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', color: mode.color, fontWeight: 700, marginBottom: 6 }}>Læringskort</div>
        <div style={{ fontSize: 12, color: c.muted }}>Trykk for å snu</div>

        <div className="card-flip-container" style={{ flex: 1, marginTop: 18, minHeight: 340 }}>
          <div className={`card-flip ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(f => !f)} style={{ position: 'relative', width: '100%', height: '100%', minHeight: 340, cursor: 'pointer' }}>
            <div className="card-face" style={{ position: 'absolute', inset: 0, background: c.card, border: `1px solid ${c.border}`, borderRadius: 22, padding: 24, display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', textAlign: 'center', boxShadow: '0 4px 20px rgba(26,31,44,0.04)' }}>
              <div style={{ fontSize: 10, letterSpacing: 2, color: c.muted, fontWeight: 600, textTransform: 'uppercase' }}>Forside</div>
              <div style={{ fontFamily: fD, fontSize: 26, fontWeight: 700, lineHeight: 1.2, marginTop: 14, letterSpacing: -0.3 }}>{card.front}</div>
              <div style={{ marginTop: 'auto', fontSize: 12, color: c.muted, display: 'flex', alignItems: 'center', gap: 6 }}>
                <IconRefresh size={14} /> Trykk for å snu
              </div>
            </div>
            <div className="card-face card-back" style={{ position: 'absolute', inset: 0, background: mode.color, color: '#fff', borderRadius: 22, padding: 24, display: 'flex', flexDirection: 'column', justifyContent: 'center', boxShadow: '0 4px 20px rgba(26,31,44,0.08)' }}>
              <div style={{ fontSize: 10, letterSpacing: 2, opacity: 0.7, fontWeight: 600, textTransform: 'uppercase' }}>Bakside</div>
              <div style={{ fontFamily: fD, fontSize: 15, fontWeight: 600, lineHeight: 1.5, marginTop: 14, letterSpacing: -0.1 }}>{card.back}</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ background: c.bg, borderTop: `1px solid ${c.border}`, padding: 18 }}>
        {flipped ? (
          <div>
            <div style={{ fontSize: 12, color: c.muted, textAlign: 'center', marginBottom: 10, fontWeight: 500 }}>Hvor godt satt det?</div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => rate(false)} style={{ flex: 1, padding: 14, background: c.card, color: c.error, border: `2px solid ${c.error}`, borderRadius: 12, fontFamily: fB, fontWeight: 700, fontSize: 14, cursor: 'pointer', letterSpacing: 0.5 }}>PÅ NYTT</button>
              <button onClick={() => rate(true)} style={{ flex: 1, padding: 14, background: c.success, color: '#fff', border: 'none', borderRadius: 12, fontFamily: fB, fontWeight: 700, fontSize: 14, cursor: 'pointer', letterSpacing: 0.5 }}>KAN DET</button>
            </div>
          </div>
        ) : (
          <button onClick={() => setFlipped(true)} style={{ width: '100%', padding: 14, background: c.ink, color: c.bg, border: 'none', borderRadius: 12, fontFamily: fB, fontWeight: 700, fontSize: 15, cursor: 'pointer', letterSpacing: 0.5 }}>SNU</button>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// STRAFFBARHETSVURDERING RUNNER (Normkjede-bygger)
// ═══════════════════════════════════════════════════════════════════════════════

function StraffbarhetsBygge({ lesson, onBack, onComplete }) {
  const mode = MODI[lesson.modeKey];
  const [idx, setIdx] = useState(0);
  const [chain, setChain] = useState([]);
  const [selected, setSelected] = useState(null);
  const [checked, setChecked] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const [correctCount, setCorrectCount] = useState(0);

  const totalSteps = lesson.steps.length;
  const step = lesson.steps[idx];
  const isLast = idx === totalSteps - 1;
  const selOpt = selected !== null ? step.options[selected] : null;
  const isCorrect = checked && selOpt?.correct;

  const check = () => { if (selected === null) return; setChecked(true); if (selOpt.correct) setCorrectCount(c => c + 1); };
  const next = () => {
    if (selOpt?.correct) setChain(ch => [...ch, { step: idx, option: selOpt, title: step.title }]);
    if (isLast) setShowSummary(true);
    else { setIdx(i => i + 1); setSelected(null); setChecked(false); }
  };
  const finish = () => onComplete(correctCount * 8 + (correctCount === totalSteps ? 20 : 0));

  if (showSummary) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
        <div style={{ padding: '14px 18px', background: c.bg, borderBottom: `1px solid ${c.border}`, display: 'flex', alignItems: 'center', gap: 14 }}>
          <button onClick={onBack} style={{ background: 'none', border: 'none', padding: 4, display: 'flex', color: c.muted, cursor: 'pointer' }}><IconX size={22} /></button>
          <div style={{ fontFamily: fD, fontSize: 16, fontWeight: 700 }}>Normkjede — oversikt</div>
        </div>
        <div style={{ flex: 1, padding: 22, paddingBottom: 100 }}>
          <div style={{ fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', color: mode.color, fontWeight: 700 }}>Mønstersvar</div>
          <div style={{ fontFamily: fD, fontSize: 24, fontWeight: 700, lineHeight: 1.2, marginTop: 6, letterSpacing: -0.3 }}>{lesson.summary.title}</div>
          <div style={{ fontSize: 13, color: c.muted, marginTop: 6, lineHeight: 1.5 }}>Fullstendig vurderingsrekkefølge for denne saken:</div>

          <div style={{ marginTop: 22, display: 'flex', flexDirection: 'column', gap: 10 }}>
            {lesson.summary.chain.map((link, i) => (
              <div key={i} className="norm-pulse" style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: 14, background: c.card, border: `1px solid ${c.border}`, borderRadius: 12, animationDelay: `${i * 0.05}s` }}>
                <div style={{ width: 28, height: 28, borderRadius: '50%', background: mode.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: fD, fontWeight: 900, fontSize: 13, flexShrink: 0 }}>{i + 1}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: fM, fontSize: 13, fontWeight: 700, color: c.ink, letterSpacing: -0.2 }}>{link.norm}</div>
                  <div style={{ fontSize: 12, color: c.muted, marginTop: 3, lineHeight: 1.5 }}>{link.description}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ position: 'sticky', bottom: 0, background: c.bg, borderTop: `1px solid ${c.border}`, padding: 18 }}>
          <button onClick={finish} style={{ width: '100%', padding: 14, background: c.success, color: '#fff', border: 'none', borderRadius: 12, fontFamily: fB, fontWeight: 700, fontSize: 15, cursor: 'pointer', letterSpacing: 0.5 }}>FERDIG</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 14, background: c.bg, borderBottom: `1px solid ${c.border}` }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'flex', color: c.muted }}><IconX size={22} /></button>
        <div style={{ flex: 1, height: 10, background: c.border, borderRadius: 999, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${((idx + (checked ? 1 : 0)) / totalSteps) * 100}%`, background: mode.color, borderRadius: 999, transition: 'width 0.35s' }} />
        </div>
        <div style={{ fontSize: 11, color: c.muted, fontWeight: 700, letterSpacing: 0.5 }}>{idx + 1}/{totalSteps}</div>
      </div>

      <div key={idx} className="fade-in" style={{ flex: 1, padding: 22, paddingBottom: 140 }}>
        {idx === 0 && (
          <div style={{ padding: '14px 16px', background: mode.softColor, borderLeft: `3px solid ${mode.color}`, borderRadius: 8, fontFamily: fD, fontSize: 14.5, lineHeight: 1.55, fontStyle: 'italic', marginBottom: 14 }}>
            {lesson.scenario}
          </div>
        )}

        {chain.length > 0 && (
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', color: c.muted, fontWeight: 700, marginBottom: 8 }}>Kjede så langt</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {chain.map((link, i) => (
                <div key={i} className="norm-pulse" style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', background: mode.softColor, borderRadius: 10, border: `1px solid ${mode.color}30` }}>
                  <div style={{ width: 22, height: 22, borderRadius: '50%', background: mode.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0 }}>{i + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontFamily: fM, fontSize: 12, fontWeight: 700, color: c.ink }}>{link.option.text}</div>
                    {link.option.badge && <div style={{ fontSize: 10, color: c.muted, fontWeight: 500 }}>{link.option.badge}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', color: mode.color, fontWeight: 700 }}>{step.title}</div>
        <div style={{ fontFamily: fD, fontSize: 19, fontWeight: 700, lineHeight: 1.3, marginTop: 8, letterSpacing: -0.2 }}>{step.question}</div>

        <div style={{ marginTop: 18, display: 'flex', flexDirection: 'column', gap: 10 }}>
          {step.options.map((opt, i) => {
            let bg = c.card, brd = c.border, col = c.ink, badge = c.muted;
            const isSel = selected === i;
            if (checked) {
              if (opt.correct) { bg = c.successSoft; brd = c.success; col = c.success; badge = c.success; }
              else if (isSel) { bg = c.errorSoft; brd = c.error; col = c.error; badge = c.error; }
            } else if (isSel) { bg = mode.softColor; brd = mode.color; col = mode.color; badge = mode.color; }
            return (
              <button key={i} onClick={() => !checked && setSelected(i)} style={{ width: '100%', padding: '13px 14px', background: bg, border: `2px solid ${brd}`, borderRadius: 14, textAlign: 'left', cursor: checked ? 'default' : 'pointer', display: 'flex', alignItems: 'center', gap: 12, fontFamily: fB, color: col, transition: 'all 0.15s' }}>
                <div style={{ width: 24, height: 24, borderRadius: 7, flexShrink: 0, border: `1.5px solid ${badge}`, color: badge, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 12 }}>{String.fromCharCode(65 + i)}</div>

                  {opt.text}
                  {opt.badge && <span style={{ fontFamily: fB, fontSize: 10, fontWeight: 500, color: c.muted, marginLeft: 8 }}>({opt.badge})</span>}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <FooterBar checked={checked} isCorrect={isCorrect} explanation={step.explanation} onCheck={check} onNext={next} canCheck={selected !== null} isLast={false} />
    </div>
  );
}
